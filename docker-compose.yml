services:
  postgres:
    image: postgres:15.17-trixie
    container_name: payments-postgres
    restart: unless-stopped
    env_file:
      - local.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: payments-rabbitmq
    restart: unless-stopped
    env_file:
      - local.env
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  migrations:
    build:
      context: .
    env_file:
      - local.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: .
    env_file:
      - local.env
    environment:
      APP_HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: ["python", "-m", "payments", "--app"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payments.rule=Host(`payments.localhost`)"
      - "traefik.http.routers.payments.entrypoints=web"
      - "traefik.http.services.payments.loadbalancer.server.port=8000"

  outbox-scheduler:
    build:
      context: .
    env_file:
      - local.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: ["python", "-m", "payments", "--scheduler"]

  consumer:
    build:
      context: .
    env_file:
      - local.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: ["python", "-m", "payments", "--consumer"]

  traefik:
    image: traefik:v3.6.1
    depends_on:
      api:
        condition: service_started
    environment:
      DOCKER_API_VERSION: "1.44"
    ports:
      - "80:80"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.payments.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"

volumes:
  postgres_data:
  rabbitmq_data:
